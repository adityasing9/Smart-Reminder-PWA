# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathplist to be prepended to sys.path in env.py
# defaults to the current working directory, which is the directory
# containing alembic.ini
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# version path separator; as of Alembic 1.3, this defaults to os.pathsep.
# Shorthand version for systems that use standard path separators:
# version_locations = %(here)s/bar:%(here)s/bat:version_locations

# version_locations = %(here)s/migrations/versions

# the database URL is read dynamically from env.py, this is a fallback placeholder
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/postgres

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
